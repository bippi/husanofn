      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
        width: 100%;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto,

        background-color: #f5f5f5;
      }

      .container {
        display: flex;
        height: 100vh;
      }

      .header {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        background: white;
        padding: 15px 20px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.12);
        z-index: 100;
      }

      .header h1 {
        color: #333;
        font-size: 24px;
        margin: 0;
      }

      .search-container {
        position: fixed;
        bottom: 30px;
        left: 50%;
        transform: translateX(-50%);
        width: calc(100% - 40px);
        max-width: 500px;
        background: white;
        padding: 12px 20px;
        box-shadow: 0 2px 12px rgba(0, 0, 0, 0.15);
        border-radius: 8px;
        z-index: 100;
      }

      @media (max-width: 768px) {
        .search-container {
          position: absolute;
          bottom: 0;
          left: 0;
          right: 0;
          width: 100%;
          max-width: none;
          transform: none;
          border-radius: 0;
          box-shadow: 0 -2px 8px rgba(0, 0, 0, 0.12);
          padding: 12px 20px;
        }

        #map {
          margin-bottom: 70px;
        }
      }

      #map {
        width: 100%;
        height: 100%;
        margin-top: 60px;
      }

      .info-panel {
        position: absolute;
        bottom: 80px;
        right: 20px;
        background: white;
        padding: 15px 20px;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
        max-width: 300px;
        z-index: 101;
        display: none;
      }

      .info-panel.active {
        display: block;
      }

      .info-panel h3 {
        color: #333;
        margin-bottom: 8px;
        font-size: 16px;
      }

      .info-panel p {
        color: #666;
        font-size: 13px;
        margin-bottom: 8px;
      }

      .location-count {
        position: absolute;
        bottom: 20px;
        left: 20px;
        background: white;
        padding: 12px 16px;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
        z-index: 50;
        color: #666;
        font-size: 14px;
        display: none;
      }

      .location-count.active {
        display: block;
      }

      #searchInput {
        padding: 12px 14px;
        font-size: 14px;
        border: 1.5px solid #e0e0e0;
        border-radius: 6px;
        width: 100%;
        transition: border-color 0.2s, box-shadow 0.2s;
        font-family: inherit;
        box-sizing: border-box;
      }

      #searchInput::placeholder {
        color: #999;
      }

      #searchInput:focus {
        outline: none;
        border-color: #4a90e2;
        box-shadow: 0 0 0 3px rgba(74, 144, 226, 0.15);
      }
    </style>
  </head>

      let map;
      let markers = [];
      let selectedMarker = null;
      let markerData = [];

      function filterMarkers(searchTerm) {
        const term = searchTerm.toLowerCase();
        let visibleCount = 0;
        const locationCountEl = document.getElementById('locationCount');

        markerData.forEach((data, index) => {
          const isMatch = data.location.name.toLowerCase().includes(term);
          data.marker.setVisible(isMatch);
          if (isMatch) visibleCount++;
        });

        if (term.length > 0) {
          locationCountEl.textContent = `Niðurstöður: ${visibleCount}`;
          locationCountEl.classList.add('active');
        } else {
          locationCountEl.classList.remove('active');
        }
      }

            map: map,
            title: location.name,
            icon: 'http://maps.google.com/mapfiles/ms/icons/red-dot.png',
          });

          marker.addListener('click', () => {
            // Reset previous marker color
            if (selectedMarker) {
              selectedMarker.setIcon(
                'http://maps.google.com/mapfiles/ms/icons/red-dot.png',
              );
            }

            // Set new marker color to blue
            marker.setIcon(
              'http://maps.google.com/mapfiles/ms/icons/blue-dot.png',
            );
            selectedMarker = marker;

            // Update info panel
            document.getElementById('placeName').textContent = location.name;
            document.getElementById(
              'placeCoords',
            ).textContent = `Breiddargráða: ${location.location.lat.toFixed(
              4,
            )}, Lengdargráða: ${location.location.lon.toFixed(4)}`;
            document.getElementById('infoPanel').classList.add('active');
          });

          markers.push(marker);
          markerData.push({ location, marker });
        });

        // Update location count
        document.getElementById(
          'locationCount',
        ).textContent = `Staðsetningar: ${locations.length}`;

        // Close info panel when clicking on map
        map.addListener('click', () => {
          document.getElementById('infoPanel').classList.remove('active');
          if (selectedMarker) {
            selectedMarker.setIcon(
              'http://maps.google.com/mapfiles/ms/icons/red-dot.png',
            );
            selectedMarker = null;
          }
        });
      }

      // Initialize map when page loads
      window.addEventListener('load', initMap);

      // Search functionality
      document.getElementById('searchInput').addEventListener('input', (e) => {
        filterMarkers(e.target.value);
      });
    </script>
  </body>
</html>
